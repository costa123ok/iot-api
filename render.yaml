 services:
  - type: web
    name: iot-api
    env: node
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        fromDatabase:
          name: iot-db
          property: connectionString
      - key: JWT_SECRET
        value: supersecretkey123
